      <h1>Noise Emporium</h1>
      <p>A browser-based music platform for Jaxsen Honeycutt's music — part streaming service, part music store. Based in Louisville, Kentucky.</p>

      <h2>Stream</h2>
      <p>Listen to albums, EPs, and singles. A free tier gives you access to previews; an Enthusiast membership ($1–5/month) unlocks the full catalog.</p>

      <h2>Shop</h2>
      <p>Buy physical CDs or download music — pay what you want. Every purchase supports the artist directly.</p>

      <h2>About the Artist</h2>
      <p>Jaxsen Honeycutt is a Louisville-based musician and developer. Noise Emporium is the third building in Jaxsenville, a fictional city he's building across the web.</p>
